<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitung Umur - Desa Slendro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0d6efd, #198754);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 360px;
        }
        .logo {
            width: 150px; /* Logo diperbesar */
            margin-bottom: 15px;
        }
        h2 {
            margin: 10px 0;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        label {
            font-size: 14px;
            font-weight: bold;
            display: block;
            text-align: left;
            margin-top: 10px;
        }
        input, button {
            padding: 10px;
            margin-top: 5px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            background-color: #0d6efd;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #0b5ed7;
        }
        .result {
            margin-top: 20px;
            font-weight: bold;
            font-size: 16px;
        }
        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="card">

    <!-- Ganti dengan file logo asli jika perlu -->
    <img src="logo_desa_slendro.png" class="logo" alt="Logo Desa Slendro">

    <h2>Alat Hitung Umur</h2>
    <div class="subtitle">Pemerintah Desa Slendro</div>

    <label>Tanggal Lahir</label>
    <input type="date" id="tglLahir">

    <label>Tanggal Hitung (Opsional/kosongkan untuk menghitung per hari ini)</label>
    <input type="date" id="tglTarget">

    <button onclick="hitungUmur()">Hitung Umur</button>

    <div class="result" id="hasil"></div>

    <div class="footer">© 2026 Desa Slendro</div>
</div>

<script>
function hitungUmur() {
    const lahirVal = document.getElementById("tglLahir").value;
    const targetVal = document.getElementById("tglTarget").value;
    const hasil = document.getElementById("hasil");

    if (!lahirVal) {
        hasil.innerHTML = "Silakan pilih tanggal lahir.";
        return;
    }

    const tglLahir = new Date(lahirVal);
    const tanggalAcuan = targetVal ? new Date(targetVal) : new Date();

    if (tglLahir > tanggalAcuan) {
        hasil.innerHTML = "Tanggal lahir tidak boleh lebih dari tanggal hitung.";
        return;
    }

    let tahun = tanggalAcuan.getFullYear() - tglLahir.getFullYear();
    let bulan = tanggalAcuan.getMonth() - tglLahir.getMonth();
    let hari = tanggalAcuan.getDate() - tglLahir.getDate();

    if (hari < 0) {
        bulan--;
        const bulanSebelumnya = new Date(tanggalAcuan.getFullYear(), tanggalAcuan.getMonth(), 0);
        hari += bulanSebelumnya.getDate();
    }

    if (bulan < 0) {
        tahun--;
        bulan += 12;
    }

    let teksTanggal = targetVal ? targetVal : "hari ini";

    hasil.innerHTML = 
        "Umur pada tangggal : " + teksTanggal + ":<br>" +
        hari + " Hari, " +
        bulan + " Bulan, " +
        tahun + " Tahun";
}
</script>

</body>
</html>
